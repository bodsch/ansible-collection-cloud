---

- name: merge ical_backup configuration between defaults and custom
  ansible.builtin.set_fact:
    ical_backup_cron: "{{ ical_backup_defaults_cron | combine(ical_backup_cron, recursive=True) }}"

- name: remove nextcloud-ical-backup cron job
  when:
    - not ical_backup_cron.enabled | default('false') | bool
    - ical_backup_cron.type | default('cron') | string | lower in ["cron", "systemd"]
  block:
    - name: remove cron jobs
      when:
        - not ical_backup_cron.type | default('cron') | string == "cron"
      block:
        - name: remove nextcloud-ical-backup cron job
          ansible.builtin.cron:
            name: Exports calendars and addressbooks from ownCloud/Nextcloud
            job: /usr/bin/nextcloud-ical-backup
            user: root
            cron_file: ical_backup
            state: absent
          failed_when: false

        - name: disable systemd timer
          ansible.builtin.service:
            name: nextcloud-ical-backup.timer
            enabled: false
            state: stopped
          failed_when: false

- name: create nextcloud-ical-backup cron job
  when:
    - ical_backup_cron.enabled | default('false') | bool
    - ical_backup_cron.type | default('cron') |  string | lower in ["cron", "systemd"]
  block:
    - name: remove cron file
      when:
        - not ical_backup_cron.type | default('cron') | string == "cron"
      block:
        - name: remove nextcloud-ical-backup cron job
          ansible.builtin.cron:
            name: Exports calendars and addressbooks from ownCloud/Nextcloud
            job: /usr/bin/nextcloud-ical-backup
            user: root
            cron_file: nextcloud-ical-backup
            state: absent
          failed_when: false

    - name: remove system unit file
      when:
        - not ical_backup_cron.type | default('cron') | string == "systemd"
      block:
        - name: disable nextcloud-ical-backup background timer
          ansible.builtin.service:
            name: nextcloud-ical-backup.timer
            enabled: false
            state: stopped
          failed_when: false

    - name: cron daemon
      when:
        - ical_backup_cron.enabled | default('false') | bool
        - ical_backup_cron.daemon | default('') | string | length > 0
        - ical_backup_cron.type | default('cron') | string == "cron"
      block:
        - name: ensure cron daemon is installed
          ansible.builtin.package:
            name: "{{ ical_backup_cron.daemon }}"
            state: present

        - name: create cron job for background jobs
          ansible.builtin.cron:
            name: Exports calendars and addressbooks from ownCloud/Nextcloud
            job: /usr/bin/nextcloud-ical-backup
            minute: "{{ ical_backup_cron.minute | default('58') }}"
            hour: "{{ ical_backup_cron.hour | default('2') }}"
            weekday: "{{ ical_backup_cron.weekday | default('*') }}"
            user: root
            cron_file: ical_backup
            state: present

    - name: systemd unit
      when:
        - ical_backup_cron.enabled | default('false') | bool
        - ical_backup_cron.type | default('cron') | string == "systemd"
      block:
        - name: create systemd unit file
          ansible.builtin.template:
            src: etc/init/systemd/nextcloud-ical-backup.service.j2
            dest: "{{ systemd_lib_directory }}/nextcloud-ical-backup.service"
            mode: "0644"
          notify:
            - daemon reload

        - name: create systemd timer file
          bodsch.systemd.systemd_timer:
            name: nextcloud-ical-backup
            unit:
              Description: Run nextcloud-ical-backup on specific weekdays
            timer:
              persistent: true
              randomized_delay_sec: "43200"
            schedule:
              weekday: "{{ ical_backup_cron.weekday | default(['Sat']) }}"
              hour: "{{ ical_backup_cron.hour | default('2') }}"
              minute: "{{ ical_backup_cron.minute | default('58') }}"
            install:
              wanted_by: timers.target
            path: "{{ systemd_lib_directory }}"
          notify:
            - daemon reload

        - name: flush handlers
          ansible.builtin.meta: flush_handlers

        - name: ensure nextcloud-ical-backup.service enabled
          ansible.builtin.service:
            name: nextcloud-ical-backup.service
            enabled: true

        - name: enable nextcloud-ical-backup background timer
          ansible.builtin.service:
            name: nextcloud-ical-backup.timer
            enabled: true
            state: started

...
