---

- name: check PHP compatibility for Nextcloud {{ nextcloud_version }}
  bodsch.cloud.nextcloud_validate_php:
    nextcloud_version: "{{ nextcloud_version }}"
    php_version: "{{ php_full_version }}"
    from_git: true
  register: supported_php_version

- name: do facts module to get latest information
  ansible.builtin.setup:

- name: assert supported php version for nextcloud {{ nextcloud_version }}
  ansible.builtin.assert:
    that:
      - supported_php_version is defined
      - supported_php_version.compatible is defined
      - supported_php_version.compatible
    msg: "{{ supported_php_version.reason }}"

- name: assert release type '{{ nextcloud_release_type }}' for version {{ nextcloud_version }}
  ansible.builtin.assert:
    that:
      - nextcloud_release_type is defined
      - nextcloud_release_type is in ["releases", "prereleases", "daily"]
    msg: "The release type must be either 'releases', or 'prereleases', or 'daily'! found: {{ nextcloud_release_type }}"
    quiet: true
  when:
    - nextcloud_main_version is version('2', '==', strict=False)

- name: include OS specific configuration
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      paths:
        - "vars"
      files:
        # eg. debian-10 / ubuntu-20 / centos-8 / oraclelinux-8
        - "{{ ansible_facts.distribution | lower }}-{{ ansible_facts.distribution_major_version }}.yml"
        # eg. archlinux-systemd / archlinux-openrc
        - "{{ ansible_facts.distribution | lower }}-{{ ansible_facts.service_mgr | lower }}.yml"
        # eg. debian / ubuntu / centos / oraclelinux
        - "{{ ansible_facts.distribution | lower }}.yml"
        # eg. redhat / debian
        - "{{ ansible_facts.os_family | lower }}.yml"
        - default.yaml
      skip: true

- name: find account defaults
  bodsch.core.account_defaults:
    default_user: "{{ nextcloud_owner_default }}"
  register: _default_user

- name: define nextcloud user and group
  ansible.builtin.set_fact:
    nextcloud_owner: "{{ _default_user.user }}"
    nextcloud_group: "{{ _default_user.group }}"

- name: assert nextcloud group
  ansible.builtin.assert:
    that:
      - nextcloud_group is defined or nextcloud_group | length == 0
    msg: no nextcloud group detected
    quiet: true

# -- verify PHP dependencies --

- name: merge nextcloud configuration between defaults and custom
  ansible.builtin.set_fact:
    nextcloud_database: "{{ nextcloud_defaults_database | combine(nextcloud_database, recursive=True) }}"

- name: define core php dependencies
  ansible.builtin.set_fact:
    nextcloud_php_dependencies: "{{ nextcloud_php_dependencies.core | default([]) }}"

- name: append database package
  ansible.builtin.set_fact:
    nextcloud_php_dependencies: "{{ nextcloud_php_dependencies + nextcloud_database | default({}) | bodsch.cloud.nc_database_driver(nextcloud_php_packages) }}"

- name: append php redis packages while redis host are defined
  ansible.builtin.set_fact:
    nextcloud_php_dependencies: "{{ nextcloud_php_dependencies + nextcloud_php_packages.redis }}"
  register: package_version
  when:
    - nextcloud_defaults.redis | default([]) | bodsch.cloud.nc_configured_cache('redis') | count > 0

- name: append php memcache packages while memcache host are defined
  ansible.builtin.set_fact:
    nextcloud_php_dependencies: "{{ nextcloud_php_dependencies + nextcloud_php_packages.memcache }}"
  register: package_version
  when:
    - nextcloud_defaults.memcache | default({}) | bodsch.cloud.nc_configured_cache('memcache') | count > 0

- name: validate php module dependencies
  bodsch.cloud.nextcloud_php_dependencies:
    package_name: "{{ php_package_name | default('php-fpm') }}"
    php_dependencies: "{{ nextcloud_php_dependencies | default([]) | bodsch.cloud.nc_php_module_name() }}"
  register: detected_php_modules

...
